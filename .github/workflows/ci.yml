name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (Python 3.9)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e ./vigil-core[dev]
          pip install -e ./vigil-licenses[dev]
          pip install -e ./vigil-cli[dev]
          pip install pytest pytest-asyncio

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check vigil-core/src vigil-licenses/src vigil-cli/src

      - name: Run tests
        run: pytest tests/ -v

  # Dogfood: use vigil-action to check Vigil's own dependencies
  compliance:
    name: License Compliance (vigil-action)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Vigil license compliance
        uses: jokerz5575/vigil-action@v1.0-beta
        with:
          policy-file: vigil.yaml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: html
          output-file: vigil-compliance-report.html
          upload-report: true
          fail-on-warning: "false"

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Build packages
        run: |
          pip install hatch
          cd vigil-core && hatch build && cd ..
          cd vigil-licenses && hatch build && cd ..
          cd vigil-cli && hatch build && cd ..
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: |
            vigil-core/dist
            vigil-licenses/dist
            vigil-cli/dist
