# vigil.yaml — Vigil License Policy
# Place this file in your project root.
# Run: vigil scan --policy vigil.yaml
#
# Licenses are organized into three tiers:
#
#   allow  — Permissive / public-domain licenses that are safe for most
#             commercial and open-source projects. Everything not on this
#             list (when the list is present) will fail the compliance check.
#
#   warn   — Weak / file-level copyleft licenses. These do NOT fail the
#             check but generate a warning so your team can review them.
#             Typical rule: "modifications to the licensed file must be
#             shared back, but you can link freely."
#
#   block  — Strong / network copyleft and non-OSI / commercial-restriction
#             licenses. Any dependency carrying one of these will immediately
#             fail the compliance check.
#
# SPDX identifiers used throughout — see https://spdx.org/licenses/

policy:
  # ---------------------------------------------------------------------------
  # ALLOW — Permissive & Public-Domain Licenses
  # ---------------------------------------------------------------------------
  allow:
    # --- Public Domain / No Rights Reserved ---
    - CC0-1.0 # Creative Commons Zero v1.0 Universal
    - Unlicense # The Unlicense
    - 0BSD # Zero-Clause BSD

    # --- MIT Family ---
    - MIT # MIT License
    - MIT-0 # MIT No Attribution
    - MIT-Modern-Variant # MIT License (Modern Variant)

    # --- Apache Family ---
    - Apache-2.0 # Apache License 2.0

    # --- BSD Family ---
    - BSD-2-Clause # BSD 2-Clause "Simplified"
    - BSD-3-Clause # BSD 3-Clause "New" or "Revised"
    - BSD-4-Clause # BSD 4-Clause "Original"
    - BSD-4-Clause-UC # BSD 4-Clause (University of California-Specific)
    - BSD-2-Clause-Patent # BSD-2-Clause Plus Patent Exception
    - BSD-3-Clause-LBNL # Lawrence Berkeley National Labs BSD variant
    - BSD-3-Clause-Open-MPI # BSD 3-Clause Open MPI variant

    # --- ISC / Similar ---
    - ISC # ISC License
    - NCSA # University of Illinois / NCSA Open Source License

    # --- Python Ecosystem ---
    - PSF-2.0 # Python Software Foundation License 2.0
    - Python-2.0 # Python License 2.0
    - CNRI-Python # CNRI portion of Python License

    # --- Boost / C++ ---
    - BSL-1.0 # Boost Software License 1.0

    # --- Academic / Research ---
    - AFL-3.0 # Academic Free License v3.0
    - AFL-2.1 # Academic Free License v2.1

    # --- Artistic / Perl ---
    - Artistic-2.0 # Artistic License 2.0

    # --- Microsoft ---
    - MS-PL # Microsoft Public License

    # --- Oracle ---
    - UPL-1.0 # Oracle Universal Permissive License v1.0

    # --- Web / Networking ---
    - W3C # W3C Software Notice and License
    - Xnet # X.Net License
    - curl # curl License

    # --- X / X11 family ---
    - X11 # X11 License (aka MIT/X11)
    - XFree86-1.1 # XFree86 License 1.1
    - xpp # XPP License

    # --- Database / System Libraries ---
    - PostgreSQL # PostgreSQL License
    - NTP # NTP License
    - HPND # Historical Permission Notice and Disclaimer
    - Libpng # libpng License
    - libtiff # libtiff License
    - IJG # Independent JPEG Group License
    - FTL # Freetype Project License

    # --- Compiler / Language Runtimes ---
    - Intel # Intel Open Source License
    - PHP-3.0 # PHP License v3.0
    - PHP-3.01 # PHP License v3.01
    - Zend-2.0 # Zend Engine License v2.0
    - TCL # TCL/TK License

    # --- Compression / zlib ---
    - Zlib # zlib License (aka zlib/libpng)
    - zlib-acknowledgement # zlib/libpng License with Acknowledgement

    # --- Zope / Python Web ---
    - ZPL-2.0 # Zope Public License 2.0
    - ZPL-2.1 # Zope Public License 2.1

    # --- Chinese Open Source ---
    - MulanPSL-2.0 # Mulan Permissive Software License 2.0

    # --- Miscellaneous OSI-Approved Permissive ---
    - WTFPL # Do What The F*ck You Want To Public License
    - EUDatagrid # EU DataGrid Software License
    - Entessa # Entessa Public License v1.0
    - Naumen # Naumen Public License
    - NBPL-1.0 # Net Boolean Public License v1
    - OSET-PL-2.1 # OSET Public License version 2.1
    - SimPL-2.0 # Simple Public License 2.0
    - Stanfordsnprintf # Stanford Secure Computing Group snprintf License
    - TOSL # Transitive Open Source License
    - TU-Berlin-1.0 # Technische Universitaet Berlin License 1.0
    - TU-Berlin-2.0 # Technische Universitaet Berlin License 2.0
    - Vim # Vim License
    - VSL-1.0 # Vovida Software License v1.0

  # ---------------------------------------------------------------------------
  # WARN — Weak / File-Level Copyleft Licenses
  # ---------------------------------------------------------------------------
  # Modifications to the licensed file(s) must be shared back, but proprietary
  # code may link against them without triggering copyleft on the whole project.
  # Review with your legal team before shipping in commercial/closed-source products.
  warn:
    # --- GNU Lesser GPL family ---
    - LGPL-2.0-only # GNU LGPL v2.0 only
    - LGPL-2.0-or-later # GNU LGPL v2.0 or later
    - LGPL-2.1 # GNU LGPL v2.1 (most common LGPL in the wild)
    - LGPL-2.1-only # GNU LGPL v2.1 only
    - LGPL-2.1-or-later # GNU LGPL v2.1 or later
    - LGPL-3.0 # GNU LGPL v3.0
    - LGPL-3.0-only # GNU LGPL v3.0 only
    - LGPL-3.0-or-later # GNU LGPL v3.0 or later

    # --- Mozilla Public License family ---
    - MPL-1.0 # Mozilla Public License 1.0
    - MPL-1.1 # Mozilla Public License 1.1
    - MPL-2.0 # Mozilla Public License 2.0
    - MPL-2.0-no-copyleft-exception # MPL 2.0 without Copyleft Exception

    # --- Eclipse Public License family ---
    - EPL-1.0 # Eclipse Public License 1.0
    - EPL-2.0 # Eclipse Public License 2.0

    # --- Common Development and Distribution License ---
    - CDDL-1.0 # Common Development and Distribution License 1.0
    - CDDL-1.1 # Common Development and Distribution License 1.1

    # --- European Union Public License ---
    - EUPL-1.0 # European Union Public License 1.0
    - EUPL-1.1 # European Union Public License 1.1
    - EUPL-1.2 # European Union Public License 1.2

    # --- Apple ---
    - APSL-2.0 # Apple Public Source License 2.0

    # --- Common Public Attribution / Common Public ---
    - CPAL-1.0 # Common Public Attribution License 1.0
    - CPL-1.0 # Common Public License 1.0

    # --- LaTeX ---
    - LPPL-1.3c # LaTeX Project Public License v1.3c
    - LPPL-1.3a # LaTeX Project Public License v1.3a

    # --- Reciprocal Licenses ---
    - RPL-1.1 # Reciprocal Public License 1.1
    - RPL-1.5 # Reciprocal Public License 1.5
    - MS-RL # Microsoft Reciprocal License
    - Nokia # Nokia Open Source License

    # --- Open Software License ---
    - OSL-1.0 # Open Software License 1.0
    - OSL-1.1 # Open Software License 1.1
    - OSL-2.0 # Open Software License 2.0
    - OSL-2.1 # Open Software License 2.1
    - OSL-3.0 # Open Software License 3.0

    # --- Sun / Oracle Legacy ---
    - SPL-1.0 # Sun Public License v1.0
    - SISSL # Sun Industry Standards Source License v1.1
    - LPL-1.0 # Lucent Public License v1.0
    - LPL-1.02 # Lucent Public License v1.02

    # --- Eiffel / Other ---
    - EFL-2.0 # Eiffel Forum License v2.0
    - QPL-1.0 # Q Public License 1.0
    - QPL-1.0-INRIA-2004 # Q Public License 1.0 INRIA 2004 variant
    - CUA-OPL-1.0 # CUA Office Public License v1.0

    # --- CeCILL (French Law) ---
    - CECILL-2.1 # CeCILL Free Software License Agreement v2.1

    # --- IBM ---
    - IPL-1.0 # IBM Public License v1.0

    # --- Interbase / Other DB ---
    - Interbase-1.0 # Interbase Public License v1.0

    # --- Reality check: CC ShareAlike for content mixed in ---
    - CC-BY-SA-3.0 # Creative Commons Attribution Share Alike 3.0 Unported
    - CC-BY-SA-4.0 # Creative Commons Attribution Share Alike 4.0 International

  # ---------------------------------------------------------------------------
  # BLOCK — Strong / Network Copyleft, Non-OSI, Commercial Restrictions
  # ---------------------------------------------------------------------------
  # Any dependency carrying one of these licenses will FAIL the compliance check.
  block:
    # --- GNU GPL family ---
    - GPL-2.0 # GNU GPL v2.0
    - GPL-2.0-only # GNU GPL v2.0 only
    - GPL-2.0-or-later # GNU GPL v2.0 or later (implies v3 is also matched)
    - GPL-3.0 # GNU GPL v3.0
    - GPL-3.0-only # GNU GPL v3.0 only
    - GPL-3.0-or-later # GNU GPL v3.0 or later

    # --- GNU Affero GPL family (network copyleft) ---
    - AGPL-1.0 # GNU AGPL v1.0
    - AGPL-1.0-only # GNU AGPL v1.0 only
    - AGPL-1.0-or-later # GNU AGPL v1.0 or later
    - AGPL-3.0 # GNU AGPL v3.0
    - AGPL-3.0-only # GNU AGPL v3.0 only
    - AGPL-3.0-or-later # GNU AGPL v3.0 or later

    # --- Server-Side / Cloud Copyleft (non-OSI) ---
    - SSPL-1.0 # Server Side Public License v1 (MongoDB)
    - BUSL-1.1 # Business Source License 1.1 (HashiCorp, MariaDB)

    # --- Strong Copyleft System Libraries ---
    - Sleepycat # Sleepycat License (Berkeley DB) — GPL-equivalent

    # --- Non-Commercial Creative Commons (not OSI-approved for software) ---
    - CC-BY-NC-1.0 # Creative Commons Non-Commercial 1.0
    - CC-BY-NC-2.0 # Creative Commons Non-Commercial 2.0
    - CC-BY-NC-2.5 # Creative Commons Non-Commercial 2.5
    - CC-BY-NC-3.0 # Creative Commons Non-Commercial 3.0
    - CC-BY-NC-4.0 # Creative Commons Non-Commercial 4.0
    - CC-BY-NC-ND-4.0 # CC Non-Commercial No-Derivatives 4.0
    - CC-BY-NC-SA-4.0 # CC Non-Commercial Share-Alike 4.0

    # --- Other Proprietary / Restricted (commonly mislabeled as open source) ---
    - Commons-Clause # Commons Clause restriction (not a standalone license)
    - Proprietary # Catch-all for packages declaring themselves proprietary
    - UNLICENSED # Explicitly unlicensed (no rights granted)

  # ---------------------------------------------------------------------------
  # Global Settings
  # ---------------------------------------------------------------------------

  # Fail the check if a package's license cannot be identified.
  # Set to true for strict compliance environments (e.g. regulated industries).
  fail_on_unknown: false
